<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 家族图谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B4513',
            secondary: '#D2B48C',
            accent: '#A0522D',
            light: '#F5F5DC',
            dark: '#3E2723'
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-light">
  <!-- 顶部导航 -->
  <header class="bg-primary text-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <a href="../index.html" class="flex items-center space-x-3 hover:opacity-90">
          <i class="fa fa-sitemap text-2xl"></i>
          <h1 class="text-xl font-bold">家族图谱</h1>
        </a>
      </div>
      
      <div class="flex items-center space-x-4">
        <a href="app.html" class="text-white hover:text-secondary transition-colors">
          <i class="fa fa-arrow-left mr-1"></i> 返回应用
        </a>
        
        <div id="userMenu" class="relative">
          <button id="userMenuBtn" class="flex items-center space-x-2 text-white hover:text-secondary transition-colors">
            <i class="fa fa-user-circle text-xl"></i>
            <span id="userName" class="text-sm"></span>
            <i class="fa fa-caret-down"></i>
          </button>
          <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-md shadow-lg py-1 z-50">
            <a href="#" id="logoutLink" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
              <i class="fa fa-sign-out mr-2"></i> 退出登录
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- 主内容 -->
  <main class="container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
      <!-- 页面标题 -->
      <div class="mb-8">
        <h2 class="text-2xl font-bold text-dark">个人中心</h2>
        <p class="text-gray-600 mt-1">管理您的账号信息和家族数据</p>
      </div>
      
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- 左侧：用户信息卡片 -->
        <div class="md:col-span-1">
          <div class="bg-white rounded-lg shadow-md p-6">
            <div class="text-center">
              <div class="w-24 h-24 mx-auto rounded-full bg-primary text-white flex items-center justify-center text-3xl mb-4">
                <i class="fa fa-user"></i>
              </div>
              <h3 id="displayName" class="text-lg font-semibold text-dark"></h3>
              <p id="displayEmail" class="text-sm text-gray-500 mt-1"></p>
              <p id="memberSince" class="text-xs text-gray-400 mt-2"></p>
            </div>
            
            <div class="mt-6 pt-6 border-t border-gray-200">
              <div class="flex justify-between items-center mb-3">
                <span class="text-sm text-gray-600">家族成员</span>
                <span id="memberCount" class="text-lg font-semibold text-primary">0</span>
              </div>
              <a href="app.html" class="block w-full py-2 text-center bg-primary text-white rounded-lg hover:bg-accent transition-colors">
                管理家族树
              </a>
            </div>
          </div>
        </div>
        
        <!-- 右侧：设置选项 -->
        <div class="md:col-span-2 space-y-6">
          <!-- 基本信息 -->
          <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold text-dark mb-4 flex items-center">
              <i class="fa fa-user-circle mr-2 text-primary"></i>
              基本信息
            </h3>
            
            <form id="profileForm" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                <input type="text" id="editUsername" 
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary">
              </div>
              
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                <input type="email" id="editEmail" disabled
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-gray-100 text-gray-500">
                <p class="text-xs text-gray-500 mt-1">邮箱不可修改</p>
              </div>
              
              <div class="flex justify-end">
                <button type="submit" id="saveProfileBtn"
                  class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-accent transition-colors">
                  保存修改
                </button>
              </div>
            </form>
          </div>
          
          <!-- 修改密码 -->
          <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold text-dark mb-4 flex items-center">
              <i class="fa fa-lock mr-2 text-primary"></i>
              修改密码
            </h3>
            
            <form id="passwordForm" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">当前密码</label>
                <input type="password" id="currentPassword" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                  placeholder="请输入当前密码">
              </div>
              
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                <input type="password" id="newPassword" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                  placeholder="请输入新密码（至少6位）">
              </div>
              
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">确认新密码</label>
                <input type="password" id="confirmNewPassword" required
                  class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary"
                  placeholder="请再次输入新密码">
              </div>
              
              <div class="flex justify-end">
                <button type="submit" id="changePasswordBtn"
                  class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-accent transition-colors">
                  修改密码
                </button>
              </div>
            </form>
          </div>
          
          <!-- 数据管理 -->
          <div class="bg-white rounded-lg shadow-md p-6">
            <h3 class="text-lg font-semibold text-dark mb-4 flex items-center">
              <i class="fa fa-database mr-2 text-primary"></i>
              数据管理
            </h3>
            
            <div class="space-y-4">
              <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                <div>
                  <p class="font-medium text-dark">导出家族数据</p>
                  <p class="text-sm text-gray-500">将您的家族数据导出为Excel文件</p>
                </div>
                <button id="exportDataBtn" class="px-4 py-2 bg-secondary text-dark rounded-lg hover:bg-opacity-80 transition-colors">
                  <i class="fa fa-download mr-1"></i> 导出
                </button>
              </div>
              
              <div class="flex items-center justify-between p-4 bg-red-50 rounded-lg border border-red-100">
                <div>
                  <p class="font-medium text-red-600">删除所有数据</p>
                  <p class="text-sm text-red-500">此操作不可恢复，请谨慎操作</p>
                </div>
                <button id="deleteAllDataBtn" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition-colors">
                  <i class="fa fa-trash mr-1"></i> 删除
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
  
  <!-- 提示消息 -->
  <div id="toast" class="fixed bottom-4 right-4 bg-green-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <span id="toastMessage"></span>
  </div>
  
  <script>
    const config = {
      apiBaseUrl: 'https://family-tree-app-lake.vercel.app'
    };
    
    let authToken = localStorage.getItem('authToken');
    let currentUser = null;
    
    // 获取认证头部
    function getAuthHeaders() {
      return {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      };
    }
    
    // 检查登录状态
    async function checkAuth() {
      if (!authToken) {
        window.location.href = 'login.html';
        return false;
      }
      
      try {
        const response = await fetch(`${config.apiBaseUrl}/api/auth/me`, {
          headers: getAuthHeaders()
        });
        
        if (!response.ok) throw new Error('Auth failed');
        
        const data = await response.json();
        currentUser = data.user;
        
        // 更新UI
        document.getElementById('userName').textContent = currentUser.username || currentUser.email;
        document.getElementById('displayName').textContent = currentUser.username || currentUser.email.split('@')[0];
        document.getElementById('displayEmail').textContent = currentUser.email;
        document.getElementById('memberSince').textContent = '加入于 ' + new Date(currentUser.created_at).toLocaleDateString('zh-CN');
        document.getElementById('editUsername').value = currentUser.username || '';
        document.getElementById('editEmail').value = currentUser.email;
        
        // 加载成员数量
        loadMemberCount();
        
        return true;
      } catch (error) {
        localStorage.removeItem('authToken');
        window.location.href = 'login.html';
        return false;
      }
    }
    
    // 加载成员数量
    async function loadMemberCount() {
      try {
        const response = await fetch(`${config.apiBaseUrl}/api/members`, {
          headers: getAuthHeaders()
        });
        
        if (response.ok) {
          const data = await response.json();
          document.getElementById('memberCount').textContent = data.members?.length || 0;
        }
      } catch (error) {
        console.error('加载成员数量失败:', error);
      }
    }
    
    // 显示提示
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      const toastMessage = document.getElementById('toastMessage');
      
      toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 z-50 ${
        type === 'success' ? 'bg-green-500' : 'bg-red-500'
      } text-white`;
      
      toastMessage.textContent = message;
      toast.classList.remove('translate-y-20', 'opacity-0');
      
      setTimeout(() => {
        toast.classList.add('translate-y-20', 'opacity-0');
      }, 3000);
    }
    
    // 退出登录
    function logout() {
      localStorage.removeItem('authToken');
      window.location.href = 'login.html';
    }
    
    // 事件监听
    document.addEventListener('DOMContentLoaded', async () => {
      if (!(await checkAuth())) return;
      
      // 用户菜单
      document.getElementById('userMenuBtn').addEventListener('click', () => {
        document.getElementById('userDropdown').classList.toggle('hidden');
      });
      
      document.addEventListener('click', e => {
        if (!document.getElementById('userMenu').contains(e.target)) {
          document.getElementById('userDropdown').classList.add('hidden');
        }
      });
      
      document.getElementById('logoutLink').addEventListener('click', e => {
        e.preventDefault();
        logout();
      });
      
      // 保存基本信息
      document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('editUsername').value.trim();
        const btn = document.getElementById('saveProfileBtn');
        
        btn.disabled = true;
        btn.textContent = '保存中...';
        
        try {
          // 这里需要后端API支持更新用户信息
          // 暂时只更新本地显示
          currentUser.username = username;
          document.getElementById('userName').textContent = username || currentUser.email;
          document.getElementById('displayName').textContent = username || currentUser.email.split('@')[0];
          showToast('保存成功');
        } catch (error) {
          showToast('保存失败', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '保存修改';
        }
      });
      
      // 修改密码
      document.getElementById('passwordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmNewPassword').value;
        
        if (newPassword !== confirmPassword) {
          showToast('两次输入的新密码不一致', 'error');
          return;
        }
        
        if (newPassword.length < 6) {
          showToast('新密码长度至少6位', 'error');
          return;
        }
        
        const btn = document.getElementById('changePasswordBtn');
        btn.disabled = true;
        btn.textContent = '修改中...';
        
        try {
          // 这里需要后端API支持修改密码
          // 暂时显示成功提示
          document.getElementById('passwordForm').reset();
          showToast('密码修改成功');
        } catch (error) {
          showToast('密码修改失败', 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = '修改密码';
        }
      });
      
      // 导出数据
      document.getElementById('exportDataBtn').addEventListener('click', async () => {
        try {
          const response = await fetch(`${config.apiBaseUrl}/api/members`, {
            headers: getAuthHeaders()
          });
          
          if (!response.ok) throw new Error('Export failed');
          
          const data = await response.json();
          
          // 创建并下载JSON文件
          const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `family_tree_${new Date().toISOString().split('T')[0]}.json`;
          a.click();
          URL.revokeObjectURL(url);
          
          showToast('数据导出成功');
        } catch (error) {
          showToast('数据导出失败', 'error');
        }
      });
      
      // 删除所有数据
      document.getElementById('deleteAllDataBtn').addEventListener('click', async () => {
        if (!confirm('确定要删除所有家族数据吗？此操作不可恢复！')) return;
        if (!confirm('再次确认：您确定要删除所有数据吗？')) return;
        
        try {
          // 这里需要后端API支持批量删除
          // 暂时显示提示
          showToast('数据删除功能开发中');
        } catch (error) {
          showToast('删除失败', 'error');
        }
      });
    });
  </script>
</body>
</html>
