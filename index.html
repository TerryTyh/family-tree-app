<html lang="zh-CN"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>家族图谱 - 记录家族历史与传承</title>
  <!-- Tailwind CSS v3 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  
  <!-- SheetJS Library for Excel handling -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#8B4513',
            secondary: '#D2B48C',
            accent: '#A0522D',
            light: '#F5F5DC',
            dark: '#3E2723'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'inner-lg': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.06)',
          }
        }
      }
    }
  </script>
  
  <style type="text/tailwindcss">
    @layer utilities {
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .node-transition {
        transition: all 0.3s ease;
      }
      .canvas-container {
        touch-action: none;
      }
      .form-input-focus:focus {
        @apply ring-2 ring-primary/50 border-primary;
      }
    }
  </style>
  
  <style>
    body {
      background-color: #F5F5DC;
      color: #3E2723;
    }
    
    .family-node {
      cursor: pointer;
      user-select: none;
    }
    
    .family-node:hover {
      filter: brightness(1.1);
    }
    
    .family-node.selected {
      stroke-width: 3px;
      stroke: #8B4513;
    }
    
    .relationship-line {
      stroke: #8B4513;
      stroke-width: 2px;
    }
    
    .relationship-line.marriage {
      stroke-dasharray: 5, 3;
    }
    
    .canvas-container {
      position: relative;
      overflow: hidden;
      background-color: #F5F5DC;
      background-image: 
        linear-gradient(rgba(139, 69, 19, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 69, 19, 0.05) 1px, transparent 1px);
      background-size: 20px 20px;
    }
    
    #familyCanvas {
      display: block;
    }
    
    .zoom-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
    }
    
    .node-tooltip {
      position: absolute;
      background-color: rgba(255, 255, 255, 0.95);
      border: 1px solid #8B4513;
      border-radius: 4px;
      padding: 8px 12px;
      font-size: 14px;
      pointer-events: none;
      z-index: 20;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      max-width: 250px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    .panel-transition {
      transition: transform 0.3s ease-in-out;
    }
    
    @media (max-width: 768px) {
      .side-panel {
        transform: translateX(-100%);
      }
      
      .side-panel.open {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <!-- 顶部导航栏 -->
  <header class="bg-primary text-white shadow-md">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <img src="https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/99b7c13e6af042b087a4e31c34aa42eb~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=2026022107294392EA892CE8AD3175A76F&amp;rrcfp=f06b921b&amp;x-expires=1774222204&amp;x-signature=R87tClMhjJjlrJ9Hzakcqh7Og7I%3D" alt="家族树图标" class="h-8 w-8">
        <h1 class="text-xl font-bold">家族图谱</h1>
      </div>
      
      <div class="hidden md:flex items-center space-x-4">
        <div class="relative">
          <input type="text" id="searchInput" placeholder="搜索家族成员..." class="px-3 py-1 rounded-full text-sm text-dark focus:outline-none focus:ring-2 focus:ring-secondary w-48 lg:w-64">
          <button class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500">
            <i class="fa fa-search"></i>
          </button>
        </div>
        
        <button id="newFamilyBtn" class="bg-secondary text-dark px-3 py-1 rounded-md text-sm font-medium hover:bg-opacity-90 transition-colors">
          <i class="fa fa-plus mr-1"></i> 新建家族
        </button>
        
        <button id="importBtn" class="bg-transparent border border-white px-3 py-1 rounded-md text-sm font-medium hover:bg-white hover:bg-opacity-10 transition-colors">
          <i class="fa fa-upload mr-1"></i> 导入
        </button>
        
        <button id="exportBtn" class="bg-transparent border border-white px-3 py-1 rounded-md text-sm font-medium hover:bg-white hover:bg-opacity-10 transition-colors">
          <i class="fa fa-download mr-1"></i> 导出
        </button>
      </div>
      
      <button id="mobileMenuBtn" class="md:hidden text-white focus:outline-none">
        <i class="fa fa-bars text-xl"></i>
      </button>
    </div>
    
    <!-- 移动端菜单 -->
    <div id="mobileMenu" class="md:hidden bg-primary hidden">
      <div class="container mx-auto px-4 py-2 space-y-2">
        <div class="relative">
          <input type="text" placeholder="搜索家族成员..." class="w-full px-3 py-2 rounded-full text-sm text-dark focus:outline-none focus:ring-2 focus:ring-secondary">
          <button class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500">
            <i class="fa fa-search"></i>
          </button>
        </div>
        
        <div class="flex flex-col space-y-2">
          <button class="bg-secondary text-dark px-3 py-2 rounded-md text-sm font-medium hover:bg-opacity-90 transition-colors">
            <i class="fa fa-plus mr-1"></i> 新建家族
          </button>
          
          <button class="bg-transparent border border-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white hover:bg-opacity-10 transition-colors">
            <i class="fa fa-upload mr-1"></i> 导入
          </button>
          
          <button class="bg-transparent border border-white px-3 py-2 rounded-md text-sm font-medium hover:bg-white hover:bg-opacity-10 transition-colors">
            <i class="fa fa-download mr-1"></i> 导出
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- 主要内容区域 -->
  <main class="flex-1 flex flex-col md:flex-row">
    <!-- 左侧控制面板 -->
    <aside id="sidePanel" class="side-panel panel-transition w-full md:w-80 bg-white shadow-lg md:shadow-none z-10 md:z-0">
      <div class="p-4 border-b border-gray-200">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-primary">控制面板</h2>
          <button id="closePanelBtn" class="md:hidden text-gray-500 focus:outline-none">
            <i class="fa fa-times"></i>
          </button>
        </div>
      </div>
      
      <!-- 面板内容 - 默认显示成员列表 -->
      <div id="panelContent">
        <!-- 成员列表 -->
        <div id="membersPanel" class="h-full flex flex-col">
          <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
              <h3 class="font-medium">家族成员</h3>
              <button id="addMemberBtn" class="text-primary hover:text-accent focus:outline-none">
                <i class="fa fa-plus-circle"></i> 添加
              </button>
            </div>
          </div>
          
          <div class="flex-1 overflow-y-auto p-2">
            <ul id="membersList" class="space-y-2">
              <!-- 成员列表将通过JavaScript动态生成 -->
            </ul>
          </div>
        </div>
        
        <!-- 添加/编辑成员面板 -->
        <div id="editMemberPanel" class="h-full flex flex-col hidden">
          <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
              <h3 id="editPanelTitle" class="font-medium">添加成员</h3>
              <button id="cancelEditBtn" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                <i class="fa fa-times"></i>
              </button>
            </div>
          </div>
          
          <div class="flex-1 overflow-y-auto p-4">
            <form id="memberForm" class="space-y-4">
              <input type="hidden" id="memberId">
              
              <div class="space-y-2">
                <label for="memberName" class="block text-sm font-medium text-gray-700">姓名</label>
                <input type="text" id="memberName" required="" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
              </div>
              
              <div class="space-y-2">
                <label class="block text-sm font-medium text-gray-700">性别</label>
                <div class="flex space-x-4">
                  <label class="inline-flex items-center">
                    <input type="radio" name="gender" value="male" checked="" class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
                    <span class="ml-2">男</span>
                  </label>
                  <label class="inline-flex items-center">
                    <input type="radio" name="gender" value="female" class="h-4 w-4 text-primary focus:ring-primary border-gray-300">
                    <span class="ml-2">女</span>
                  </label>
                </div>
              </div>
              
              <div class="grid grid-cols-2 gap-4">
                <div class="space-y-2">
                  <label for="birthDate" class="block text-sm font-medium text-gray-700">出生日期</label>
                  <input type="date" id="birthDate" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                </div>
                
                <div class="space-y-2">
                  <label for="birthTime" class="block text-sm font-medium text-gray-700">出生时间</label>
                  <input type="time" id="birthTime" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                </div>
                
                <div class="space-y-2">
                  <label for="deathDate" class="block text-sm font-medium text-gray-700">去世日期</label>
                  <input type="date" id="deathDate" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                </div>
              </div>
              
              <div class="space-y-2">
                <label for="photoUpload" class="block text-sm font-medium text-gray-700">照片</label>
                <div class="flex items-center space-x-3">
                  <div class="w-16 h-16 rounded-full border-2 border-gray-300 flex items-center justify-center bg-gray-50 overflow-hidden">
                    <img id="photoPreview" src="https://p26-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/1877fbaeebdc492193e52a9443a71588~tplv-a9rns2rl98-image.image?lk3s=8e244e95&rcl=2026022107294392EA892CE8AD3175A76F&rrcfp=f06b921b&x-expires=1774222213&x-signature=nl3mjnH872EmFBEJPocudhhTLm4%3D" 
                         alt="照片预览" class="w-full h-full object-cover hidden">
                    <i id="photoIcon" class="fa fa-camera text-gray-400 text-2xl"></i>
                  </div>
                  <div class="flex-1">
                    <input type="file" id="photoUpload" accept="image/*" 
                           class="hidden">
                    <label for="photoUpload" class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm text-center cursor-pointer hover:bg-gray-50 form-input-focus">
                      <i class="fa fa-upload mr-1"></i> 点击上传照片
                    </label>
                  </div>
                </div>
                <p class="text-xs text-gray-500">支持 JPG、PNG、GIF 格式，最大 5MB</p>
          </div>
          
          <div class="space-y-2">
                <label for="bio" class="block text-sm font-medium text-gray-700">生平简介</label>
                <textarea id="bio" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus"></textarea>
              </div>
              
              <div class="border-t border-gray-200 pt-4">
                <h4 class="text-sm font-medium text-gray-700 mb-3">家庭关系</h4>
                
                <div class="space-y-3">
                  <div class="space-y-2">
                    <label for="fatherId" class="block text-sm font-medium text-gray-700">父亲</label>
                    <select id="fatherId" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                      <option value="">选择父亲</option>
                      <!-- 选项将通过JavaScript动态生成 -->
                    </select>
                  </div>
                  
                  <div class="space-y-2">
                    <label for="motherId" class="block text-sm font-medium text-gray-700">母亲</label>
                    <select id="motherId" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                      <option value="">选择母亲</option>
                      <!-- 选项将通过JavaScript动态生成 -->
                    </select>
                  </div>
                  
                  <div class="space-y-2">
                    <label for="spouseId" class="block text-sm font-medium text-gray-700">配偶</label>
                    <select id="spouseId" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
                      <option value="">选择配偶</option>
                      <!-- 选项将通过JavaScript动态生成 -->
                    </select>
                  </div>
                </div>
              </div>
            </form>
          </div>
          
          <div class="p-4 border-t border-gray-200 bg-gray-50">
            <div class="flex justify-end space-x-3">
              <button id="deleteMemberBtn" class="px-4 py-2 border border-red-500 text-red-500 rounded-md text-sm font-medium hover:bg-red-50 focus:outline-none hidden">
                <i class="fa fa-trash mr-1"></i> 删除
              </button>
              <button id="saveMemberBtn" class="px-4 py-2 bg-primary text-white rounded-md text-sm font-medium hover:bg-accent focus:outline-none">
                <i class="fa fa-save mr-1"></i> 保存
              </button>
            </div>
          </div>
        </div>
        
        <!-- 成员详情面板 -->
        <div id="memberDetailsPanel" class="h-full flex flex-col hidden">
          <div class="p-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
              <h3 class="font-medium">成员详情</h3>
              <button id="closeDetailsBtn" class="text-gray-500 hover:text-gray-700 focus:outline-none">
                <i class="fa fa-times"></i>
              </button>
            </div>
          </div>
          
          <div class="flex-1 overflow-y-auto p-4">
            <div id="memberDetailsContent" class="space-y-4">
              <!-- 成员详情将通过JavaScript动态生成 -->
            </div>
          </div>
          
          <div class="p-4 border-t border-gray-200 bg-gray-50">
            <div class="flex justify-end space-x-3">
              <button id="editDetailsBtn" class="px-4 py-2 border border-primary text-primary rounded-md text-sm font-medium hover:bg-primary hover:bg-opacity-10 focus:outline-none">
                <i class="fa fa-pencil mr-1"></i> 编辑
              </button>
              <button id="closeDetailsPanelBtn" class="px-4 py-2 bg-primary text-white rounded-md text-sm font-medium hover:bg-accent focus:outline-none">
                关闭
              </button>
            </div>
          </div>
        </div>
      </div>
    </aside>
    
    <!-- 右侧家族树视图 -->
    <div class="flex-1 flex flex-col">
      <div class="bg-white shadow-sm p-3 flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <button id="togglePanelBtn" class="md:hidden text-primary hover:text-accent focus:outline-none">
            <i class="fa fa-bars"></i>
          </button>
          
          <div class="flex items-center space-x-2">
            <button id="zoomInBtn" class="p-1 text-primary hover:text-accent focus:outline-none">
              <i class="fa fa-search-plus"></i>
            </button>
            <span id="zoomLevel" class="text-sm font-medium">100%</span>
            <button id="zoomOutBtn" class="p-1 text-primary hover:text-accent focus:outline-none">
              <i class="fa fa-search-minus"></i>
            </button>
            <button id="resetZoomBtn" class="p-1 text-primary hover:text-accent focus:outline-none">
              <i class="fa fa-arrows-alt"></i>
            </button>
          </div>
        </div>
        
        <div class="flex items-center space-x-3">

          <button id="checkRelationsBtn" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium hover:bg-gray-100 focus:outline-none">
            <i class="fa fa-check-circle mr-1"></i> 检查关系
          </button>
        </div>
      </div>
      
      <div class="flex-1 canvas-container">
        <canvas id="familyCanvas"></canvas>
        <div id="nodeTooltip" class="node-tooltip"></div>
        
        <div class="zoom-controls bg-white rounded-full shadow-md flex">
          <button id="zoomInControl" class="w-10 h-10 flex items-center justify-center text-primary hover:bg-gray-100 rounded-l-full focus:outline-none">
            <i class="fa fa-plus"></i>
          </button>
          <button id="zoomOutControl" class="w-10 h-10 flex items-center justify-center text-primary hover:bg-gray-100 rounded-r-full focus:outline-none">
            <i class="fa fa-minus"></i>
          </button>
        </div>
        
        <!-- 初始提示 -->
        <div id="initialPrompt" class="absolute inset-0 flex items-center justify-center bg-light bg-opacity-90 z-5">
          <div class="text-center max-w-md p-6 bg-white rounded-lg shadow-lg">
            <img src="https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/rc/pc/super_tool/99b7c13e6af042b087a4e31c34aa42eb~tplv-a9rns2rl98-image.image?lk3s=8e244e95&amp;rcl=2026022107294392EA892CE8AD3175A76F&amp;rrcfp=f06b921b&amp;x-expires=1774222204&amp;x-signature=R87tClMhjJjlrJ9Hzakcqh7Og7I%3D" alt="家族树图标" class="h-16 w-16 mx-auto mb-4">
            <h2 class="text-xl font-bold text-primary mb-2">欢迎使用家族图谱</h2>
            <p class="text-gray-600 mb-6">开始创建您的家族树，记录家族历史与传承</p>
            <button id="startCreatingBtn" class="px-6 py-2 bg-primary text-white rounded-md font-medium hover:bg-accent focus:outline-none">
              开始创建
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- 关系检查结果弹窗 -->
  <div id="relationsModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full max-h-[80vh] overflow-y-auto">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h3 class="text-lg font-semibold">关系检查结果</h3>
        <button id="closeRelationsModal" class="text-gray-500 hover:text-gray-700 focus:outline-none">
          <i class="fa fa-times"></i>
        </button>
      </div>
      
      <div class="p-4">
        <div id="relationsResults" class="space-y-3">
          <!-- 关系检查结果将通过JavaScript动态生成 -->
        </div>
      </div>
      
      <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end">
        <button id="closeRelationsBtn" class="px-4 py-2 bg-primary text-white rounded-md text-sm font-medium hover:bg-accent focus:outline-none">
          关闭
        </button>
      </div>
    </div>
  </div>
  
  <!-- 头像放大弹窗 -->
  <div id="avatarModal" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 hidden">
    <!-- 图片容器 -->
    <div class="relative max-w-3xl max-h-[90vh]">
      <img id="avatarModalImage" src="" alt="放大头像" class="max-w-full max-h-[90vh] object-contain rounded-lg" style="transform: scale(1); transform-origin: center center; transition: transform 0.2s ease;">
    </div>
    
    <!-- 缩放控制按钮 - 放在屏幕最下方 -->
    <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 flex space-x-4 z-10 bg-black bg-opacity-50 rounded-full px-4 py-2">
      <button id="zoomOutAvatar" class="bg-white bg-opacity-20 hover:bg-opacity-40 rounded-full p-2 text-white focus:outline-none transition-all duration-200">
        <i class="fa fa-search-minus"></i>
      </button>
      <button id="resetZoomAvatar" class="bg-white bg-opacity-20 hover:bg-opacity-40 rounded-full p-2 text-white focus:outline-none transition-all duration-200">
        <i class="fa fa-refresh"></i>
      </button>
      <button id="zoomInAvatar" class="bg-white bg-opacity-20 hover:bg-opacity-40 rounded-full p-2 text-white focus:outline-none transition-all duration-200">
        <i class="fa fa-search-plus"></i>
      </button>
    </div>
  </div>



  <!-- 导入/导出弹窗 -->
  <div id="importExportModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-lg shadow-xl max-w-md w-full">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h3 id="importExportTitle" class="text-lg font-semibold">导入家族数据</h3>
        <button id="closeImportExportModal" class="text-gray-500 hover:text-gray-700 focus:outline-none">
          <i class="fa fa-times"></i>
        </button>
      </div>
      
      <div class="p-4">
        <div id="importContent">
          <p class="text-gray-600 mb-4">选择Excel格式的家族数据文件进行导入：</p>
          <input type="file" id="importFile" accept=".xlsx,.xls" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-primary file:text-white hover:file:bg-accent">
          <div class="mt-3">
            <button id="downloadTemplateBtn" class="text-primary hover:text-accent text-sm font-medium">
              <i class="fa fa-download mr-1"></i> 下载导入模板
            </button>
          </div>
          <div id="importError" class="mt-3 text-red-500 text-sm hidden"></div>
        </div>
        
        <div id="exportContent" class="hidden">
          <p class="text-gray-600 mb-4">将您的家族数据导出为Excel文件：</p>
          <div class="mb-4">
            <label for="exportFilename" class="block text-sm font-medium text-gray-700 mb-1">文件名</label>
            <input type="text" id="exportFilename" value="family_tree_data" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm form-input-focus">
          </div>
          <div class="p-3 bg-yellow-50 border border-yellow-200 rounded-md text-sm text-yellow-800">

    // 处理照片上传
    function handlePhotoUpload(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      // 检查文件大小
      if (file.size > 5 * 1024 * 1024) {
        alert('照片大小不能超过5MB');
        return;
      }
      
      // 检查文件类型
      if (!file.type.match('image.*')) {
        alert('请选择图片文件');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const photoPreview = document.getElementById('photoPreview');
        const photoIcon = document.getElementById('photoIcon');
        const editorImage = document.getElementById('editorImage');
        
        // 显示预览
        photoPreview.src = e.target.result;
        photoPreview.classList.remove('hidden');
        photoIcon.classList.add('hidden');
        
        // 显示编辑器弹窗
        const photoEditorModal = document.getElementById('photoEditorModal');
        photoEditorModal.classList.remove('hidden');
        
        // 重置编辑器状态
        editorState = {
          isDraggingImage: false,
          isDraggingCropBox: false,
          startX: 0,
          startY: 0,
          scale: 1,
          offsetX: 0,
          offsetY: 0,
          cropBoxX: 0,
          cropBoxY: 0
        };
        
        // 设置图片源并等待加载完成
        editorImage.onload = function() {
          initPhotoEditorState();
        };
        editorImage.src = e.target.result;
      };
      
      reader.readAsDataURL(file);
    }
    
    // 初始化照片编辑器状态
    function initPhotoEditorState() {
      const editorImage = document.getElementById('editorImage');
      const cropBox = document.getElementById('cropBox');
      const container = document.querySelector('#photoEditorModal .relative');
      const containerWidth = container.offsetWidth;
      const containerHeight = container.offsetHeight;
      
      // 重置样式，避免冲突
      editorImage.style.width = 'auto';
      editorImage.style.height = 'auto';
      editorImage.style.transform = 'none';
      editorImage.style.left = '0px';
      editorImage.style.top = '0px';
      
      // 调整图片大小以适应容器
      const imgRatio = editorImage.width / editorImage.height;
      const containerRatio = containerWidth / containerHeight;
      
      if (imgRatio > containerRatio) {
        // 图片比容器宽，按宽度缩放
        editorImage.style.width = '100%';
        editorImage.style.height = 'auto';
      } else {
        // 图片比容器高，按高度缩放
        editorImage.style.height = '100%';
        editorImage.style.width = 'auto';
      }
      
      // 居中图片
      editorState.offsetX = (containerWidth - editorImage.width) / 2;
      editorState.offsetY = (containerHeight - editorImage.height) / 2;
      editorImage.style.left = editorState.offsetX + 'px';
      editorImage.style.top = editorState.offsetY + 'px';
      
      // 调整裁剪框大小，使其高度与照片原始高度保持一致，同时保持等比例
      // 计算裁剪框的目标高度（与容器高度相关，确保在容器内）
      const targetCropHeight = containerHeight * 0.7; // 使用容器高度的70%
      const targetCropWidth = targetCropHeight * (70 / 91); // 保持原始宽高比 70:91
      
      // 设置裁剪框大小
      cropBox.style.width = targetCropWidth + 'px';
      cropBox.style.height = targetCropHeight + 'px';
      
      // 初始化裁剪框位置（居中）
      editorState.cropBoxX = (containerWidth - targetCropWidth) / 2;
      editorState.cropBoxY = (containerHeight - targetCropHeight) / 2;
      cropBox.style.left = editorState.cropBoxX + 'px';
      cropBox.style.top = editorState.cropBoxY + 'px';
      cropBox.style.transform = 'none'; // 移除初始的transform
    }
    
    // 初始化照片编辑器事件监听器（只执行一次）
    function initPhotoEditor() {
      console.log('初始化照片编辑器事件监听器');
      
      // 检查元素是否存在
      console.log('元素检查:', {
        zoomInBtn: !!document.getElementById('zoomInBtn'),
        zoomOutBtn: !!document.getElementById('zoomOutBtn')
      });
      
      // 直接在DOM上绑定事件，使用事件委托，确保按钮存在时事件能被触发
      document.addEventListener('click', function(e) {
        // 放大按钮点击
        if (e.target.closest('#zoomInBtn')) {
          console.log('放大按钮被点击');
          const editorImage = document.getElementById('editorImage');
          if (editorImage) {
            editorState.scale += 0.1;
            console.log('放大，当前缩放比例:', editorState.scale);
            // 确保变换生效
            editorImage.style.transform = `scale(${editorState.scale})`;
            editorImage.style.transformOrigin = 'center center';
            console.log('应用的变换:', editorImage.style.transform);
          }
        }
        
        // 缩小按钮点击
        if (e.target.closest('#zoomOutBtn')) {
          console.log('缩小按钮被点击');
          const editorImage = document.getElementById('editorImage');
          const cropBox = document.getElementById('cropBox');
          const container = document.querySelector('#photoEditorModal .relative');
          
          if (editorImage && cropBox && container) {
            // 计算最小缩放比例：使照片高度与裁剪框高度一致
            const minScale = cropBox.offsetHeight / container.offsetHeight;
            console.log('缩小，当前缩放比例:', editorState.scale, '最小缩放比例:', minScale);
            
            if (editorState.scale > minScale) {
              editorState.scale -= 0.1;
              // 确保变换生效
              editorImage.style.transform = `scale(${editorState.scale})`;
              editorImage.style.transformOrigin = 'center center';
              console.log('应用的变换:', editorImage.style.transform);
            }
          }
        }
      });
      
      console.log('缩放按钮事件监听器已通过事件委托绑定');
      
      // 拖动图片
      document.addEventListener('mousedown', function(e) {
        if (e.target.closest('#editorImage')) {
          editorState.isDraggingImage = true;
          const editorImage = document.getElementById('editorImage');
          // 直接记录鼠标初始位置
          editorState.startX = e.clientX;
          editorState.startY = e.clientY;
          // 记录图片初始位置
          editorState.imgStartX = editorState.offsetX;
          editorState.imgStartY = editorState.offsetY;
        }
      });
      
      // 拖动裁剪框
      document.addEventListener('mousedown', function(e) {
        if (e.target.closest('#cropBox')) {
          e.stopPropagation(); // 阻止事件冒泡到图片
          editorState.isDraggingCropBox = true;
          const cropBox = document.getElementById('cropBox');
          const container = document.querySelector('#photoEditorModal .relative');
          const containerRect = container.getBoundingClientRect();
          editorState.startX = e.clientX - (editorState.cropBoxX + containerRect.left);
          editorState.startY = e.clientY - (editorState.cropBoxY + containerRect.top);
        }
      });
      
      // 鼠标移动事件
      document.addEventListener('mousemove', function(e) {
        const editorImage = document.getElementById('editorImage');
        const cropBox = document.getElementById('cropBox');
        
        if (editorState.isDraggingImage && editorImage) {
          // 计算鼠标移动的距离
          const deltaX = e.clientX - editorState.startX;
          const deltaY = e.clientY - editorState.startY;
          
          // 直接使用鼠标移动的距离，不考虑缩放比例
          // 这样当用户向上拖动时，照片的top值会减小，可能变为负数
          
          // 计算新的图片位置
          editorState.offsetX = editorState.imgStartX + deltaX;
          editorState.offsetY = editorState.imgStartY + deltaY;
          
          // 更新图片位置
          editorImage.style.left = editorState.offsetX + 'px';
          editorImage.style.top = editorState.offsetY + 'px';
        } else if (editorState.isDraggingCropBox && cropBox) {
          const container = document.querySelector('#photoEditorModal .relative');
          const containerRect = container.getBoundingClientRect();
          const containerWidth = containerRect.width;
          const containerHeight = containerRect.height;
          
          // 计算新位置，确保裁剪框在容器内
          let newX = e.clientX - editorState.startX - containerRect.left;
          let newY = e.clientY - editorState.startY - containerRect.top;
          
          // 边界检查
          newX = Math.max(0, Math.min(newX, containerWidth - cropBox.offsetWidth));
          newY = Math.max(0, Math.min(newY, containerHeight - cropBox.offsetHeight));
          
          // 更新裁剪框位置
          cropBox.style.left = newX + 'px';
          cropBox.style.top = newY + 'px';
          cropBox.style.transform = 'none'; // 移除初始的transform
          
          // 更新裁剪框坐标
          editorState.cropBoxX = newX;
          editorState.cropBoxY = newY;
        }
      });
      
      // 鼠标释放事件
      document.addEventListener('mouseup', function() {
        editorState.isDraggingImage = false;
        editorState.isDraggingCropBox = false;
      });
      
      // 应用裁剪
      document.addEventListener('click', function(e) {
        if (e.target.closest('#applyCropBtn')) {
          console.log('应用裁剪按钮被点击');
          const container = document.querySelector('#photoEditorModal .relative');
          const containerRect = container.getBoundingClientRect();
          const editorImage = document.getElementById('editorImage');
          const cropBox = document.getElementById('cropBox');
          
          // 计算裁剪区域
          const cropX = editorState.cropBoxX;
          const cropY = editorState.cropBoxY;
          const cropWidth = cropBox.offsetWidth;
          const cropHeight = cropBox.offsetHeight;
          
          // 创建canvas用于裁剪
          const canvas = document.createElement('canvas');
          canvas.width = cropWidth;
          canvas.height = cropHeight;
          const ctx = canvas.getContext('2d');
          
          // 创建临时图片处理原始数据
          const tempImage = new Image();
          tempImage.onload = function() {
            try {
              // 计算图片在容器中的缩放比例
              let imgScale;
              const imgRatio = tempImage.width / tempImage.height;
              const containerRatio = container.offsetWidth / container.offsetHeight;
              
              if (imgRatio > containerRatio) {
                imgScale = container.offsetWidth / tempImage.width;
              } else {
                imgScale = container.offsetHeight / tempImage.height;
              }
              
              // 重新设计裁剪逻辑，考虑CSS transform: scale()的影响
              console.log('开始裁剪，参数:', {
                cropX: cropX,
                cropY: cropY,
                cropWidth: cropWidth,
                cropHeight: cropHeight,
                offsetX: editorState.offsetX,
                offsetY: editorState.offsetY,
                userScale: editorState.scale,
                imgScale: imgScale,
                tempImageWidth: tempImage.width,
                tempImageHeight: tempImage.height
              });
              
              // 核心思路：
              // 1. 计算裁剪区域在容器中的位置
              // 2. 计算照片在容器中的实际显示位置（考虑缩放和transform-origin）
              // 3. 计算裁剪区域相对于照片的位置
              // 4. 转换为原始照片上的位置
              
              // 1. 计算裁剪区域在容器中的位置
              const cropRect = {
                x: cropX,
                y: cropY,
                width: cropWidth,
                height: cropHeight
              };
              console.log('裁剪区域在容器中的位置:', cropRect);
              
              // 2. 计算照片在容器中的实际显示位置
              // 考虑CSS transform: scale()和transform-origin: center center的影响
              const originalImgWidth = tempImage.width * imgScale;
              const originalImgHeight = tempImage.height * imgScale;
              const scaledImgWidth = originalImgWidth * editorState.scale;
              const scaledImgHeight = originalImgHeight * editorState.scale;
              
              // 由于transform-origin: center center，图片的左上角位置会偏移
              // 偏移量 = (缩放后的大小 - 原始大小) / 2
              const offsetXDueToScale = (scaledImgWidth - originalImgWidth) / 2;
              const offsetYDueToScale = (scaledImgHeight - originalImgHeight) / 2;
              
              // 照片在容器中的实际左上角位置
              const imgLeft = editorState.offsetX - offsetXDueToScale;
              const imgTop = editorState.offsetY - offsetYDueToScale;
              console.log('照片在容器中的实际位置:', { imgLeft, imgTop });
              console.log('缩放导致的偏移:', { offsetXDueToScale, offsetYDueToScale });
              
              // 3. 计算裁剪区域相对于照片的位置
              // 照片坐标系：左上角为(0, 0)，向右为X轴正方向，向下为Y轴正方向
              const relativeX = cropRect.x - imgLeft;
              const relativeY = cropRect.y - imgTop;
              console.log('裁剪区域相对于照片的位置:', { relativeX, relativeY });
              
              // 4. 计算总缩放比例
              const totalScale = imgScale * editorState.scale;
              console.log('总缩放比例:', totalScale);
              
              // 5. 计算在原始照片上的裁剪位置
              const originalCropX = relativeX / totalScale;
              const originalCropY = relativeY / totalScale;
              const originalCropWidth = cropRect.width / totalScale;
              const originalCropHeight = cropRect.height / totalScale;
              console.log('在原始照片上的裁剪位置:', { originalCropX, originalCropY, originalCropWidth, originalCropHeight });
              
              // 6. 边界检查，确保裁剪区域在图片范围内
              const finalCropX = Math.max(0, originalCropX);
              const finalCropY = Math.max(0, originalCropY);
              const finalCropWidth = Math.min(tempImage.width - finalCropX, originalCropWidth);
              const finalCropHeight = Math.min(tempImage.height - finalCropY, originalCropHeight);
              console.log('调整后的裁剪位置:', { finalCropX, finalCropY, finalCropWidth, finalCropHeight });
              
              // 7. 创建canvas并绘制裁剪后的图片
              const cropCanvas = document.createElement('canvas');
              cropCanvas.width = cropWidth;
              cropCanvas.height = cropHeight;
              const cropCtx = cropCanvas.getContext('2d');
              
              // 8. 绘制裁剪后的图片
              cropCtx.drawImage(tempImage, finalCropX, finalCropY, finalCropWidth, finalCropHeight, 0, 0, cropWidth, cropHeight);
              
              // 9. 获取裁剪结果
              const dataUrl = cropCanvas.toDataURL('image/jpeg');
              console.log('裁剪完成，dataUrl长度:', dataUrl.length);
              
              if (dataUrl && dataUrl !== 'data:,') {
                photoPreview.src = dataUrl;
                console.log('裁剪成功，预览图已更新');
              } else {
                console.warn('裁剪失败，使用原始图片');
                photoPreview.src = editorImage.src;
              }
              
              // 隐藏编辑器弹窗
              const photoEditorModal = document.getElementById('photoEditorModal');
              photoEditorModal.classList.add('hidden');
              
              return;
            } catch (error) {
              console.error('裁剪失败:', error);
              photoPreview.src = editorImage.src;
              alert('裁剪过程中出现错误，已使用原始图片');
            } finally {
              // 隐藏编辑器弹窗
              const photoEditorModal = document.getElementById('photoEditorModal');
              photoEditorModal.classList.add('hidden');
            }
          };
          tempImage.src = editorImage.src;
        }
      });
      
      // 关闭编辑器弹窗
      document.addEventListener('click', function(e) {
        if (e.target.closest('#closeEditorModal')) {
          console.log('关闭编辑器弹窗');
          const photoEditorModal = document.getElementById('photoEditorModal');
          photoEditorModal.classList.add('hidden');
        }
      });
      
      // 成员头像点击事件 - 显示放大头像
      // 使用事件委托，确保能处理动态生成的元素
      document.addEventListener('click', function(e) {
        // 检查是否点击了成员头像容器或其中的图片
        const avatarContainer = e.target.closest('[data-member-id]');
        if (avatarContainer && avatarContainer.classList.contains('member-avatar')) {
          const memberId = avatarContainer.dataset.memberId;
          const member = familyData.members.find(m => m.id === memberId);
          
          console.log('点击了成员头像:', { memberId, member: member ? member.name : '未找到' });
          
          if (member && member.photo) {
            const avatarModal = document.getElementById('avatarModal');
            const avatarModalImage = document.getElementById('avatarModalImage');
            
            if (avatarModal && avatarModalImage) {
              // 设置弹窗图片源
              avatarModalImage.src = member.photo;
              avatarModalImage.alt = member.name;
              
              // 显示弹窗
              avatarModal.classList.remove('hidden');
              console.log('显示头像弹窗:', member.photo);
            } else {
              console.error('头像弹窗元素未找到');
            }
          } else if (member && !member.photo) {
            console.log('成员没有照片，不显示弹窗');
          } else {
            console.error('未找到成员:', memberId);
          }
        }
      });
      
      // 头像弹窗缩放功能
      let avatarScale = 1;
      const maxAvatarScale = 3; // 最大缩放比例
      const minAvatarScale = 1; // 最小缩放比例（默认大小）
      
      // 放大按钮点击事件
      document.addEventListener('click', function(e) {
        if (e.target.closest('#zoomInAvatar')) {
          if (avatarScale < maxAvatarScale) {
            avatarScale += 0.2;
            updateAvatarScale();
          }
        }
      });
      
      // 缩小按钮点击事件
      document.addEventListener('click', function(e) {
        if (e.target.closest('#zoomOutAvatar')) {
          if (avatarScale > minAvatarScale) {
            avatarScale -= 0.2;
            updateAvatarScale();
          }
        }
      });
      
      // 重置缩放按钮点击事件
      document.addEventListener('click', function(e) {
        if (e.target.closest('#resetZoomAvatar')) {
          avatarScale = 1;
          updateAvatarScale();
        }
      });
      
      // 更新头像缩放
      function updateAvatarScale() {
        const avatarImage = document.getElementById('avatarModalImage');
        if (avatarImage) {
          avatarImage.style.transform = `scale(${avatarScale})`;
          console.log('更新头像缩放:', avatarScale);
        }
      }
      
      // 关闭头像放大弹窗
      document.addEventListener('click', function(e) {
        // 点击蒙层（非图片和非缩放按钮）时关闭弹窗
        if (e.target.closest('#avatarModal') && !e.target.closest('#avatarModalImage') && !e.target.closest('#zoomInAvatar') && !e.target.closest('#zoomOutAvatar') && !e.target.closest('#resetZoomAvatar')) {
          const avatarModal = document.getElementById('avatarModal');
          if (avatarModal) {
            avatarModal.classList.add('hidden');
            // 重置缩放比例
            avatarScale = 1;
            updateAvatarScale();
          }
        }
      });
    }
    

    
    async function saveMember() {
      const birthDate = document.getElementById('birthDate').value || null;
      const birthTime = document.getElementById('birthTime').value || null;
      
      console.log('=== 保存成员 ===');
      console.log('出生日期:', birthDate);
      console.log('出生时间:', birthTime);
      
      // 计算生辰八字
      const baZi = await calculateBaZi(birthDate, birthTime);
      console.log('生辰八字:', baZi);
      
      const formData = {
        id: document.getElementById('memberId').value || generateId(),
        name: document.getElementById('memberName').value.trim(),
        gender: document.querySelector('input[name="gender"]:checked').value,
        birthDate: birthDate,
        birthTime: birthTime,
        baZi: baZi,
        deathDate: document.getElementById('deathDate').value || null,
        photo: document.getElementById('photoPreview').classList.contains('hidden') ? null : document.getElementById('photoPreview').src,
        bio: document.getElementById('bio').value.trim() || null,
        fatherId: document.getElementById('fatherId').value || null,
        motherId: document.getElementById('motherId').value || null,
        spouseIds: document.getElementById('spouseId').value ? [document.getElementById('spouseId').value] : []
      };
      
      console.log('表单数据:', formData);
      
      // 验证数据
      if (!formData.name) {
        alert('请输入姓名');
        return;
      }
      
      if (formData.deathDate && formData.birthDate && formData.deathDate < formData.birthDate) {
        alert('去世日期不能早于出生日期');
        return;
      }
      
      // 检查关系冲突
      if (formData.fatherId === formData.motherId && formData.fatherId) {
        alert('父亲和母亲不能是同一个人');
        return;
      }
      
      if (formData.fatherId === formData.id || formData.motherId === formData.id) {
        alert('不能将自己设为父母');
        return;
      }
      
      if (formData.spouseIds.includes(formData.id)) {
        alert('不能与自己结婚');
        return;
      }
      
      try {
        // 显示loading UI
        showLoading('保存中...');
        
        let response;
        if (currentEditMode === 'add') {
          // 添加新成员
          response = await fetch(`${config.apiBaseUrl}/api/members`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
          });
        } else {
          // 更新现有成员
          const memberId = formData.id;
          response = await fetch(`${config.apiBaseUrl}/api/members/${memberId}`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
          });
        }
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(`API调用失败: ${response.status} - ${errorData.error || '未知错误'}`);
        }
        
        const result = await response.json();
        console.log('保存结果:', result);
        
        // 重新加载数据
        await loadFamilyData();
        updateMembersList();
        updateRelationsSelects();
        
        // 如果有数据，隐藏初始提示并渲染家族树
        if (familyData.members.length > 0) {
          document.getElementById('initialPrompt').classList.add('hidden');
          renderFamilyTree();
        }
        
        // 跳转到成员详情页
        showMemberDetails(formData.id);
        
        // 显示成功消息
        showMessage('保存成功');
      } catch (error) {
        console.error('保存成员失败:', error);
        alert('保存失败: ' + error.message);
      } finally {
        // 隐藏loading UI
        hideLoading();
      }
    }
    
    // 删除成员
    async function deleteMember() {
      const memberId = document.getElementById('memberId').value;
      if (!memberId) return;
      
      // 检查是否有其他成员引用该成员作为父母
      const referencedBy = familyData.members.filter(member => 
        member.fatherId === memberId || member.motherId === memberId
      );
      
      if (referencedBy.length > 0) {
        const names = referencedBy.map(m => m.name).join('、');
        alert(`无法删除该成员，因为以下成员将其作为父母: ${names}`);
        return;
      }
      
      if (!confirm('确定要删除这个成员吗？相关的关系也会被删除。')) {
        return;
      }
      
      try {
        // 显示loading UI
        showLoading('删除中...');
        
        // 通过API删除成员
        const response = await fetch(`${config.apiBaseUrl}/api/members/${memberId}`, {
          method: 'DELETE',
          headers: {
            'Content-Type': 'application/json'
          }
        });
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(`API调用失败: ${response.status} - ${errorData.error || '未知错误'}`);
        }
        
        const result = await response.json();
        console.log('删除结果:', result);
        
        // 重新加载数据
        await loadFamilyData();
        updateMembersList();
        updateRelationsSelects();
        
        // 如果没有数据，显示初始提示
        if (familyData.members.length === 0) {
          document.getElementById('initialPrompt').classList.remove('hidden');
          clearCanvas();
        } else {
          renderFamilyTree();
        }
        
        // 返回成员列表
        showMembersPanel();
        
        // 显示成功消息
        showMessage('删除成功');
      } catch (error) {
        console.error('删除成员失败:', error);
        alert('删除失败: ' + error.message);
      } finally {
        // 隐藏loading UI
        hideLoading();
      }
    }

        li.className = 'p-2 hover:bg-gray-100 rounded-md cursor-pointer flex items-center';

    // 渲染家族树
    function renderFamilyTree() {
      if (familyData.members.length === 0) {
        clearCanvas();
        return;
      }
      
      clearCanvas();
      
      // 计算节点位置
      calculateNodePositions();
      
      // 绘制连接线
      drawLines();
      
      // 绘制节点
      drawNodes();
      
      // 隐藏初始提示
      document.getElementById('initialPrompt').classList.add('hidden');
    }
    
    // 计算节点位置
    function calculateNodePositions() {
      nodes = [];
      lines = [];
      
      if (familyData.members.length === 0) return;
      
      // 找到所有有相互关系的成员组（连通分量）
      const connectedComponents = findConnectedComponents();
      
      // 如果没有根成员但有成员，设置第一个连通分量的第一个成员为根成员
      if (!familyData.rootMemberId && connectedComponents.length > 0) {
        familyData.rootMemberId = connectedComponents[0][0];
      }
      
      // 根据布局类型计算节点位置
      switch (currentLayout) {
        case 'horizontal':
          calculateHorizontalLayout(connectedComponents);
          break;
        case 'vertical':
          calculateVerticalLayout(connectedComponents);
          break;
        case 'radial':
          calculateRadialLayout(connectedComponents);
          break;
        case 'compact':
          calculateCompactLayout(connectedComponents);
          break;
        default:
          calculateHorizontalLayout(connectedComponents);
      }
    }
    
    // 找到所有有相互关系的成员组（连通分量）
    function findConnectedComponents() {
      const visited = new Set();
      const components = [];
      
      // 为每个未访问的成员查找其连通分量
      familyData.members.forEach(member => {
        if (!visited.has(member.id)) {
          const component = [];
          const queue = [member.id];
          visited.add(member.id);
          
          while (queue.length > 0) {
            const currentId = queue.shift();
            component.push(currentId);
            
            const currentMember = familyData.members.find(m => m.id === currentId);
            
            // 添加所有相关成员（父母、配偶、子女）
            const relatedIds = new Set();
            
            // 父母
            if (currentMember.fatherId) relatedIds.add(currentMember.fatherId);
            if (currentMember.motherId) relatedIds.add(currentMember.motherId);
            
            // 配偶
            if (currentMember.spouseIds) {
              currentMember.spouseIds.forEach(id => relatedIds.add(id));
            }
            
            // 子女
            const children = getChildren(currentId);
            children.forEach(id => relatedIds.add(id));
            
            // 添加未访问的相关成员到队列
            relatedIds.forEach(id => {
              if (!visited.has(id)) {
                visited.add(id);
                queue.push(id);
              }
            });
          }
          
          components.push(component);
        }
      });
      
      return components;
    }
    
    // 计算水平布局
    function calculateHorizontalLayout(connectedComponents) {
      if (!connectedComponents || connectedComponents.length === 0) return;
      
      // 节点大小和间距
      const nodeWidth = 100;
      const nodeHeight = 160;
      const horizontalSpacing = 200;
      const verticalSpacing = 250;
      const componentSpacing = 300; // 不同家族组之间的间距
      
      let totalWidth = 0;
      let maxHeight = 0;
      
      // 计算每个连通分量的布局
      const componentLayouts = connectedComponents.map(component => {
        // 计算这个分量的世代
        const generations = calculateComponentGenerations(component);
        
        // 计算这个分量的宽度和高度
        const width = generations.length * horizontalSpacing;
        const height = Math.max(...generations.map(gen => gen.length)) * verticalSpacing;
        
        totalWidth += width;
        maxHeight = Math.max(maxHeight, height);
        
        return {
          generations,
          width,
          height
        };
      });
      
      // 计算起始位置，使所有分量居中
      const startX = (canvas.width - totalWidth - (connectedComponents.length - 1) * componentSpacing) / 2;
      const centerY = canvas.height / 2;
      
      let currentX = startX;
      
      // 为每个分量放置节点
      connectedComponents.forEach((component, componentIndex) => {
        const layout = componentLayouts[componentIndex];
        const generations = layout.generations;
        
        generations.forEach((generation, genIndex) => {
          const x = currentX + genIndex * horizontalSpacing;
          const genCenterY = centerY - (generation.length - 1) * verticalSpacing / 2;
          
          generation.forEach((memberId, index) => {
            const y = genCenterY + index * verticalSpacing;
            
            nodes.push({
              id: memberId,
              x: x,
              y: y,
              width: nodeWidth,
              height: nodeHeight
            });
          });
        });
        
        currentX += layout.width + componentSpacing;
      });
      
      // 计算连接线
      calculateLines();
    }
    
    // 计算垂直布局
    function calculateVerticalLayout(connectedComponents) {
      if (!connectedComponents || connectedComponents.length === 0) return;
      
      // 节点大小和间距
      const nodeWidth = 100;
      const nodeHeight = 160;
      const horizontalSpacing = 200;
      const verticalSpacing = 250;
      const componentSpacing = 200; // 不同家族组之间的间距
      
      let totalHeight = 0;
      let maxWidth = 0;
      
      // 计算每个连通分量的布局
      const componentLayouts = connectedComponents.map(component => {
        // 计算这个分量的世代
        const generations = calculateComponentGenerations(component);
        
        // 计算这个分量的宽度和高度
        const width = Math.max(...generations.map(gen => gen.length)) * horizontalSpacing;
        const height = generations.length * verticalSpacing;
        
        totalHeight += height;
        maxWidth = Math.max(maxWidth, width);
        
        return {
          generations,
          width,
          height
        };
      });
      
      // 计算起始位置，使所有分量居中
      const startY = (canvas.height - totalHeight - (connectedComponents.length - 1) * componentSpacing) / 2;
      const centerX = canvas.width / 2;
      
      let currentY = startY;
      
      // 为每个分量放置节点
      connectedComponents.forEach((component, componentIndex) => {
        const layout = componentLayouts[componentIndex];
        const generations = layout.generations;
        
        generations.forEach((generation, genIndex) => {
          const y = currentY + genIndex * verticalSpacing;
          const genCenterX = centerX - (generation.length - 1) * horizontalSpacing / 2;
          
          generation.forEach((memberId, index) => {
            const x = genCenterX + index * horizontalSpacing;
            
            nodes.push({
              id: memberId,
              x: x,
              y: y,
              width: nodeWidth,
              height: nodeHeight
            });
          });
        });
        
        currentY += layout.height + componentSpacing;
      });
      
      // 计算连接线
      calculateLines();
    }
    
    // 计算放射状布局
    function calculateRadialLayout(connectedComponents) {
      if (!connectedComponents || connectedComponents.length === 0) return;
      
      // 节点大小和间距
      const nodeWidth = 80;
      const nodeHeight = 140;
      const radiusIncrement = 180;
      const componentRadius = 400; // 不同家族组之间的半径
      
      // 中心位置
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // 如果只有一个连通分量，使用标准放射状布局
      if (connectedComponents.length === 1) {
        const component = connectedComponents[0];
        const generations = calculateComponentGenerations(component);
        
        // 添加根节点
        const rootMemberId = component[0];
        nodes.push({
          id: rootMemberId,
          x: centerX - nodeWidth / 2,
          y: centerY - nodeHeight / 2,
          width: nodeWidth,
          height: nodeHeight
        });
        
        // 添加其他世代
        generations.slice(1).forEach((generation, genIndex) => {
          const radius = (genIndex + 1) * radiusIncrement;
          const angleStep = (2 * Math.PI) / generation.length;
          
          generation.forEach((memberId, index) => {
            const angle = index * angleStep;
            const x = centerX + radius * Math.cos(angle) - nodeWidth / 2;
            const y = centerY + radius * Math.sin(angle) - nodeHeight / 2;
            
            nodes.push({
              id: memberId,
              x: x,
              y: y,
              width: nodeWidth,
              height: nodeHeight
            });
          });
        });
      } else {
        // 多个连通分量，围绕中心排列
        const angleStep = (2 * Math.PI) / connectedComponents.length;
        
        connectedComponents.forEach((component, componentIndex) => {
          const componentAngle = componentIndex * angleStep;
          const componentX = centerX + componentRadius * Math.cos(componentAngle);
          const componentY = centerY + componentRadius * Math.sin(componentAngle);
          
          const generations = calculateComponentGenerations(component);
          
          // 添加该分量的根节点
          const rootMemberId = component[0];
          nodes.push({
            id: rootMemberId,
            x: componentX - nodeWidth / 2,
            y: componentY - nodeHeight / 2,
            width: nodeWidth,
            height: nodeHeight
          });
          
          // 添加该分量的其他世代（简化布局）
          generations.slice(1).forEach((generation, genIndex) => {
            const radius = (genIndex + 1) * 120; // 减小半径增量
            const smallAngleStep = (2 * Math.PI) / generation.length;
            
            generation.forEach((memberId, index) => {
              const angle = index * smallAngleStep;
              const x = componentX + radius * Math.cos(angle) - nodeWidth / 2;
              const y = componentY + radius * Math.sin(angle) - nodeHeight / 2;
              
              nodes.push({
                id: memberId,
                x: x,
                y: y,
                width: nodeWidth,
                height: nodeHeight
              });
            });
          });
        });
      }
      
      // 计算连接线
      calculateLines();
    }
    
    // 计算紧凑布局
    function calculateCompactLayout(connectedComponents) {
      if (!connectedComponents || connectedComponents.length === 0) return;
      
      // 节点大小和间距
      const nodeWidth = 80;
      const nodeHeight = 140;
      const horizontalSpacing = 150;
      const verticalSpacing = 220;
      const componentSpacing = 250; // 不同家族组之间的间距
      
      let totalWidth = 0;
      let maxHeight = 0;
      
      // 计算每个连通分量的布局
      const componentLayouts = connectedComponents.map(component => {
        // 使用层次遍历计算位置
        const queue = [component[0]];
        const visited = new Set([component[0]]);
        const levels = [];
        
        while (queue.length > 0) {
          const levelSize = queue.length;
          const currentLevel = [];
          
          for (let i = 0; i < levelSize; i++) {
            const memberId = queue.shift();
            currentLevel.push(memberId);
            
            const member = familyData.members.find(m => m.id === memberId);
            
            // 添加子女
            const children = getChildren(memberId);
            children.forEach(childId => {
              if (!visited.has(childId)) {
                visited.add(childId);
                queue.push(childId);
              }
            });
            
            // 添加配偶
            if (member.spouseIds) {
              member.spouseIds.forEach(spouseId => {
                if (!visited.has(spouseId)) {
                  visited.add(spouseId);
                  queue.push(spouseId);
                }
              });
            }
          }
          
          levels.push(currentLevel);
        }
        
        // 计算这个分量的宽度和高度
        const width = Math.max(...levels.map(level => (level.length - 1) * horizontalSpacing)) + nodeWidth;
        const height = (levels.length - 1) * verticalSpacing + nodeHeight;
        
        totalWidth += width;
        maxHeight = Math.max(maxHeight, height);
        
        return {
          levels,
          width,
          height
        };
      });
      
      // 计算起始位置，使所有分量居中
      const startX = (canvas.width - totalWidth - (connectedComponents.length - 1) * componentSpacing) / 2;
      const startY = (canvas.height - maxHeight) / 2;
      
      let currentX = startX;
      
      // 为每个分量放置节点
      connectedComponents.forEach((component, componentIndex) => {
        const layout = componentLayouts[componentIndex];
        const levels = layout.levels;
        
        levels.forEach((level, levelIndex) => {
          const y = startY + levelIndex * verticalSpacing;
          
          // 计算这一层的总宽度
          const levelWidth = (level.length - 1) * horizontalSpacing;
          const levelStartX = currentX + (layout.width - levelWidth) / 2;
          
          level.forEach((memberId, index) => {
            const x = levelStartX + index * horizontalSpacing;
            
            nodes.push({
              id: memberId,
              x: x,
              y: y,
              width: nodeWidth,
              height: nodeHeight
            });
          });
        });
        
        currentX += layout.width + componentSpacing;
      });
      
      // 计算连接线
      calculateLines();
    }
    
    // 计算单个连通分量的世代
    function calculateComponentGenerations(component) {
      const generations = [];
      const visited = new Set();
      
      if (component.length === 0) return generations;
      
      // 找到分量中最年长的一代作为起始点（没有父母的成员）
      let rootMembers = component.filter(memberId => {
        const member = familyData.members.find(m => m.id === memberId);
        return !member.fatherId && !member.motherId;
      });
      
      // 如果没有找到根成员，使用分量的第一个成员
      if (rootMembers.length === 0) {
        rootMembers = [component[0]];
      }
      
      // 从根成员开始，使用广度优先搜索计算世代
      let currentGeneration = rootMembers;
      currentGeneration.forEach(id => visited.add(id));
      
      while (currentGeneration.length > 0) {
        generations.push(currentGeneration);
        
        const nextGeneration = [];
        
        currentGeneration.forEach(memberId => {
          const member = familyData.members.find(m => m.id === memberId);
          
          // 添加子女
          const children = getChildren(memberId);
          children.forEach(childId => {
            if (!visited.has(childId) && component.includes(childId)) {
              visited.add(childId);
              nextGeneration.push(childId);
            }
          });
          
          // 添加配偶
          if (member.spouseIds) {
            member.spouseIds.forEach(spouseId => {
              if (!visited.has(spouseId) && component.includes(spouseId)) {
                visited.add(spouseId);
                nextGeneration.push(spouseId);
              }
            });
          }
        });
        
        currentGeneration = nextGeneration;
      }
      
      return generations;
    }
    
    // 计算世代
    function calculateGenerations() {
      const generations = [];
      const visited = new Set();
      const rootMember = familyData.members.find(m => m.id === familyData.rootMemberId);
      
      if (!rootMember) return generations;
      
      // 从根成员开始，使用广度优先搜索计算世代
      let currentGeneration = [rootMember.id];
      visited.add(rootMember.id);
      
      while (currentGeneration.length > 0) {
        generations.push(currentGeneration);
        
        const nextGeneration = [];
        
        currentGeneration.forEach(memberId => {
          const member = familyData.members.find(m => m.id === memberId);
          
          // 添加子女
          const children = getChildren(memberId);
          children.forEach(childId => {
            if (!visited.has(childId)) {
              visited.add(childId);
              nextGeneration.push(childId);
            }
          });
          
          // 添加配偶
          if (member.spouseIds) {
            member.spouseIds.forEach(spouseId => {
              if (!visited.has(spouseId)) {
                visited.add(spouseId);
                nextGeneration.push(spouseId);
              }
            });
          }
        });
        
        currentGeneration = nextGeneration;
      }
      
      return generations;
    }
    
    // 计算连接线
    function calculateLines() {
      lines = [];
      
      nodes.forEach(node => {
        const member = familyData.members.find(m => m.id === node.id);
        
        // 连接到父母
        if (member.fatherId) {
          const fatherNode = nodes.find(n => n.id === member.fatherId);
          if (fatherNode) {
            lines.push({
              type: 'parent',
              from: {
                x: fatherNode.x + fatherNode.width / 2,
                y: fatherNode.y + fatherNode.height
              },
              to: {
                x: node.x + node.width / 2,
                y: node.y
              },
              memberId: member.id,
              relatedId: member.fatherId
            });
          }
        }
        
        if (member.motherId) {
          const motherNode = nodes.find(n => n.id === member.motherId);
          if (motherNode) {
            lines.push({
              type: 'parent',
              from: {
                x: motherNode.x + motherNode.width / 2,
                y: motherNode.y + motherNode.height
              },
              to: {
                x: node.x + node.width / 2,
                y: node.y
              },
              memberId: member.id,
              relatedId: member.motherId
            });
          }
        }
        
        // 连接到配偶
        if (member.spouseIds) {
          member.spouseIds.forEach(spouseId => {
            // 避免重复绘制婚姻线
            if (member.id < spouseId) {
              const spouseNode = nodes.find(n => n.id === spouseId);
              if (spouseNode) {
                lines.push({
                  type: 'marriage',
                  from: {
                    x: node.x + node.width,
                    y: node.y + node.height / 2
                  },
                  to: {
                    x: spouseNode.x,
                    y: spouseNode.y + spouseNode.height / 2
                  },
                  memberId: member.id,
                  relatedId: spouseId
                });
              }
            }
          });
        }
      });
    }
    
    // 绘制连接线
    function drawLines() {
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      
      lines.forEach(line => {
        ctx.beginPath();
        ctx.moveTo(line.from.x, line.from.y);
        ctx.lineTo(line.to.x, line.to.y);
        
        if (line.type === 'marriage') {
          ctx.setLineDash([5, 3]);
        } else {
          ctx.setLineDash([]);
        }
        
        ctx.strokeStyle = '#8B4513';
        ctx.lineWidth = 2;
        ctx.stroke();
      });
      
      ctx.restore();
    }
    
    // 绘制节点
    function drawNodes() {
      ctx.save();
      ctx.translate(offsetX, offsetY);
      ctx.scale(scale, scale);
      
      nodes.forEach(node => {
        const member = familyData.members.find(m => m.id === node.id);
        const isSelected = selectedMemberId === member.id;
        
        // 绘制节点背景
        ctx.fillStyle = member.gender === 'male' ? '#D2B48C' : '#FFD6B3';
        ctx.strokeStyle = isSelected ? '#8B4513' : '#A0522D';
        ctx.lineWidth = isSelected ? 3 : 1;
        
        ctx.beginPath();
        ctx.roundRect(node.x, node.y, node.width, node.height, 8);
        ctx.fill();
        ctx.stroke();
        
        // 绘制照片或图标
        if (member.photo) {
          const img = new Image();
          img.src = member.photo;
          
          // 保存当前状态
          ctx.save();
          
          // 创建长方形裁剪区域（高大于宽）
          const photoWidth = node.width * 0.7;
          const photoHeight = photoWidth * 1.3; // 高度大于宽度
          const photoX = node.x + node.width / 2 - photoWidth / 2;
          const photoY = node.y + 10;
          
          ctx.beginPath();
          ctx.roundRect(photoX, photoY, photoWidth, photoHeight, 4);
          ctx.clip();
          
          // 绘制图片
          ctx.drawImage(
            img,
            photoX,
            photoY,
            photoWidth,
            photoHeight
          );
          
          // 恢复状态
          ctx.restore();
        } else {
          // 绘制默认图标
          const iconWidth = node.width * 0.7;
          const iconHeight = iconWidth * 1.3; // 高度大于宽度
          const iconX = node.x + node.width / 2 - iconWidth / 2;
          const iconY = node.y + 10;
          
          ctx.fillStyle = member.gender === 'male' ? '#8B4513' : '#CD5C5C';
          ctx.beginPath();
          ctx.roundRect(iconX, iconY, iconWidth, iconHeight, 4);
          ctx.fill();
          
          ctx.fillStyle = '#FFFFFF';
          ctx.font = 'bold ' + (iconWidth * 0.4) + 'px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(
            member.gender === 'male' ? '👨' : '👩',
            node.x + node.width / 2,
            node.y + 10 + iconHeight / 2
          );
        }
        
        // 绘制姓名
        ctx.fillStyle = '#3E2723';
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(
          member.name,
          node.x + node.width / 2,
          node.y + 105
        );
        
        // 绘制出生日期
        if (member.birthDate) {
          const birthYear = new Date(member.birthDate).getFullYear();
          let deathYear = '';
          
          if (member.deathDate) {
            deathYear = ' - ' + new Date(member.deathDate).getFullYear();
          }
          
          ctx.fillStyle = '#666666';
          ctx.font = '12px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(
            birthYear + deathYear,
            node.x + node.width / 2,
            node.y + 125
          );
        }
      });
      
      ctx.restore();
    }
    
    // 清除Canvas
    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    
    // 开始拖拽
    function startDrag(e) {
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      // 检查是否点击了节点
      const clickedNode = getNodeAtPosition(mouseX, mouseY);
      
      if (clickedNode) {
        // 点击了节点，显示详情
        selectedMemberId = clickedNode.id;
        renderFamilyTree();
        showMemberDetails(clickedNode.id);
      } else {
        // 点击了空白区域，开始拖拽画布
        isDragging = true;
        dragStartX = mouseX - offsetX;
        dragStartY = mouseY - offsetY;
        canvas.style.cursor = 'grabbing';
      }
    }
    
    // 拖拽
    function drag(e) {
      if (!isDragging) return;
      
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      offsetX = mouseX - dragStartX;
      offsetY = mouseY - dragStartY;
      
      renderFamilyTree();
    }
    
    // 结束拖拽
    function endDrag() {
      isDragging = false;
      canvas.style.cursor = 'default';
    }
    
    // 缩放
    function zoom(e) {
      e.preventDefault();
      
      const rect = canvas.getBoundingClientRect();
      const mouseX = e.clientX - rect.left;
      const mouseY = e.clientY - rect.top;
      
      // 计算鼠标相对于画布的位置
      const mouseXCanvas = (mouseX - offsetX) / scale;
      const mouseYCanvas = (mouseY - offsetY) / scale;
      
      // 缩放因子
      const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
      
      // 限制缩放范围
      const newScale = Math.max(0.1, Math.min(3, scale * zoomFactor));
      
      // 调整偏移量，使鼠标位置保持不变
      offsetX = mouseX - mouseXCanvas * newScale;
      offsetY = mouseY - mouseYCanvas * newScale;
      
      scale = newScale;
      
      // 更新缩放级别显示
      document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
      
      renderFamilyTree();
    }
    
    // 放大
    function zoomIn() {
      const newScale = Math.min(3, scale * 1.2);
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // 调整偏移量，使画布中心保持不变
      offsetX = centerX - (centerX - offsetX) * (newScale / scale);
      offsetY = centerY - (centerY - offsetY) * (newScale / scale);
      
      scale = newScale;
      
      // 更新缩放级别显示
      document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
      
      renderFamilyTree();
    }
    
    // 缩小
    function zoomOut() {
      const newScale = Math.max(0.1, scale / 1.2);
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // 调整偏移量，使画布中心保持不变
      offsetX = centerX - (centerX - offsetX) * (newScale / scale);
      offsetY = centerY - (centerY - offsetY) * (newScale / scale);
      
      scale = newScale;
      
      // 更新缩放级别显示
      document.getElementById('zoomLevel').textContent = Math.round(scale * 100) + '%';
      
      renderFamilyTree();
    }
    
    // 重置缩放
    function resetZoom() {
      scale = 1;
      offsetX = 0;
      offsetY = 0;
      
      // 更新缩放级别显示
      document.getElementById('zoomLevel').textContent = '100%';
      
      renderFamilyTree();
    }
    
    // 获取指定位置的节点
    function getNodeAtPosition(x, y) {
      // 将屏幕坐标转换为画布坐标
      const canvasX = (x - offsetX) / scale;
      const canvasY = (y - offsetY) / scale;
      
      // 检查是否点击了节点
      for (const node of nodes) {
        if (
          canvasX >= node.x &&
          canvasX <= node.x + node.width &&
          canvasY >= node.y &&
          canvasY <= node.y + node.height
        ) {
          return node;
        }
      }
      
      return null;
    }
    
    // 处理触摸开始
    function handleTouchStart(e) {
      e.preventDefault();
      
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousedown', {
          clientX: touch.clientX,
          clientY: touch.clientY
        });
        
        startDrag(mouseEvent);
      }
    }
    
    // 处理触摸移动
    function handleTouchMove(e) {
      e.preventDefault();
      
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        const mouseEvent = new MouseEvent('mousemove', {
          clientX: touch.clientX,
          clientY: touch.clientY
        });
        
        drag(mouseEvent);
      }
    }
    
    // 处理触摸结束
    function handleTouchEnd(e) {
      e.preventDefault();
      
      const mouseEvent = new MouseEvent('mouseup');
      endDrag(mouseEvent);
    }
    
    // 检查关系
    function checkRelations() {
      const results = [];
      
      // 检查循环关系
      familyData.members.forEach(member => {
        // 检查是否是自己的祖先
        if (isAncestorOf(member.id, member.id)) {
          results.push({
            type: 'error',
            message: `${member.name} 存在循环祖先关系`
          });
        }
        
        // 检查父母是否是配偶
        if (member.fatherId && member.motherId) {
          const father = familyData.members.find(m => m.id === member.fatherId);
          if (father && father.spouseIds && !father.spouseIds.includes(member.motherId)) {
            results.push({
              type: 'warning',
              message: `${member.name} 的父母 ${getMemberName(member.fatherId)} 和 ${getMemberName(member.motherId)} 不是配偶关系`
            });
          }
        }
        
        // 检查是否有子女但没有配偶
        if (getChildren(member.id).length > 0 && (!member.spouseIds || member.spouseIds.length === 0)) {
          results.push({
            type: 'info',
            message: `${member.name} 有子女但没有记录配偶`
          });
        }
      });
      
      // 显示结果
      const relationsResults = document.getElementById('relationsResults');
      relationsResults.innerHTML = '';
      
      if (results.length === 0) {
        relationsResults.innerHTML = `
          <div class="p-3 bg-green-50 border border-green-200 rounded-md text-sm text-green-800">
            <i class="fa fa-check-circle mr-1"></i> 未发现任何关系问题
          </div>
        `;
      } else {
        results.forEach(result => {
          let className = '';
          let icon = '';
          
          switch (result.type) {
            case 'error':
              className = 'bg-red-50 border border-red-200 text-red-800';
              icon = 'fa-exclamation-circle';
              break;
            case 'warning':
              className = 'bg-yellow-50 border border-yellow-200 text-yellow-800';
              icon = 'fa-exclamation-triangle';
              break;
            case 'info':
              className = 'bg-blue-50 border border-blue-200 text-blue-800';
              icon = 'fa-info-circle';
              break;
          }
          
          const div = document.createElement('div');
          div.className = `p-3 ${className} rounded-md text-sm`;
          div.innerHTML = `<i class="fa ${icon} mr-1"></i> ${result.message}`;
          
          relationsResults.appendChild(div);
        });
      }
      
      document.getElementById('relationsModal').classList.remove('hidden');
    }
    
    // 检查一个成员是否是另一个成员的祖先
    function isAncestorOf(ancestorId, descendantId) {
      const descendant = familyData.members.find(m => m.id === descendantId);
      
      if (!descendant) return false;
      
      if (descendant.fatherId === ancestorId || descendant.motherId === ancestorId) {
        return true;
      }
      
      return (
        (descendant.fatherId && isAncestorOf(ancestorId, descendant.fatherId)) ||
        (descendant.motherId && isAncestorOf(ancestorId, descendant.motherId))
      );
    }
    
    // 获取成员的子女
    function getChildren(memberId) {
      return familyData.members
        .filter(m => m.fatherId === memberId || m.motherId === memberId)
        .map(m => m.id);
    }
    
    // 获取成员姓名
    function getMemberName(memberId) {
      const member = familyData.members.find(m => m.id === memberId);
      return member ? member.name : '未知';
    }
    
    // 获取成员照片
    function getMemberPhoto(memberId) {
      const member = familyData.members.find(m => m.id === memberId);
      return member ? member.photo : null;
    }

    // 计算生辰八字（调用后端API）
    async function calculateBaZi(birthDate, birthTime) {
      if (!birthDate) return null;
      
      console.log('=== 开始计算生辰八字 ===');
      
      // 构建完整的出生日期时间字符串
      let birthDateTimeStr;
      if (birthTime) {
        birthDateTimeStr = `${birthDate} ${birthTime}:00`;
      } else {
        birthDateTimeStr = `${birthDate} 12:00:00`; // 默认中午12点
      }
      
      console.log('输入的出生时间:', birthDateTimeStr);
      
      try {
        // 调用后端API
        console.log('开始调用API...');
        const response = await fetch(`${config.apiBaseUrl}/api/calculate-bazi`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            birthTime: birthDateTimeStr,
            longitude: 120.0 // 默认经度
          })
        });
        
        console.log('API响应状态:', response.status);
        
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(`API调用失败: ${response.status} - ${errorData.error || '未知错误'}`);
        }
        
        const data = await response.json();
        console.log('API返回结果:', data);
        
        // 检查返回数据是否完整
        if (!data.year || !data.month || !data.day || !data.time) {
          throw new Error('API返回的数据不完整');
        }
        
        // 组合生辰八字
        const baZi = {
          year: data.year,
          month: data.month,
          day: data.day,
          time: data.time,
          full: data.full
        };
        
        console.log('最终计算得到的生辰八字:', baZi.full);
        console.log('=== 生辰八字计算结束 ===');
        
        return baZi;
      } catch (error) {
        console.error('计算生辰八字失败:', error);
        // 失败时返回null
        return null;
      }
    }
    
    // 生成唯一ID
    function generateId() {
      // 生成UUID v4格式的ID
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = Math.random() * 16 | 0;
        const v = c === 'x' ? r : (r & 0x3 | 0x8);
        return v.toString(16);
      });
    }

    // IndexedDB数据库初始化
    function initDatabase() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('familyTreeDB', 1);
        
        request.onerror = function(event) {
          console.error('数据库初始化失败:', event.target.error);
          reject(event.target.error);
        };
        
        request.onsuccess = function(event) {
          resolve(event.target.result);
        };
        
        request.onupgradeneeded = function(event) {
          const db = event.target.result;
          
          // 如果不存在familyData对象存储空间，则创建
          if (!db.objectStoreNames.contains('familyData')) {
            db.createObjectStore('familyData');
          }
        };
      });
    }

        updateMembersList();
        console.log('更新成员列表完成');
        
        updateRelationsSelects();
        console.log('更新关系选择器完成');
        
        // 渲染家族树
        if (familyData.members.length > 0) {
          document.getElementById('initialPrompt').classList.add('hidden');
          renderFamilyTree();
          console.log('渲染家族树完成');
        }
        
        // 显示导入结果
        let resultMessage = `导入完成！\n成功: ${importResults.success} 条`;
        
        if (importResults.errors.length > 0) {
          resultMessage += '\n\n注意事项:';
          importResults.errors.forEach(error => {
            resultMessage += `\n- ${error.name}: ${error.errors.join(', ')}`;
          });
        }
        
        console.log('导入结果:', resultMessage);
        alert(resultMessage);
      } catch (error) {
        console.error('导入失败:', error);
        document.getElementById('importError').textContent = '导入失败: ' + error.message;
        document.getElementById('importError').classList.remove('hidden');
      } finally {
        // 隐藏loading UI
        hideLoading();
        console.log('隐藏loading UI');
      }
    }
    
    // 导出家族数据
    function exportFamilyData() {
      const filename = document.getElementById('exportFilename').value || 'family_tree_data';
      
      // 准备导出数据
      const exportData = familyData.members.map(member => {
        return {
          'ID': member.id,
          '姓名': member.name,
          '性别': member.gender === 'male' ? '男' : '女',
          '出生日期': member.birthDate || '',
          '出生时间': member.birthTime || '',
          '农历生日': member.lunarBirthDate || '',
          '生辰八字': member.baZi && member.baZi.full ? member.baZi.full : '',
          '去世日期': member.deathDate || '',
          '生平简介': member.bio || '',
          '父亲ID': member.fatherId || '',
          '母亲ID': member.motherId || '',
          '配偶ID': member.spouseIds ? member.spouseIds.join(',') : '',
          '子女ID': member.childrenIds ? member.childrenIds.join(',') : ''
        };
      });
      
      // 创建工作表
      const worksheet = XLSX.utils.json_to_sheet(exportData);
      
      // 创建工作簿
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, '家族成员');
      
      // 导出为Excel文件
      XLSX.writeFile(workbook, filename + '.xlsx');
    }
    
    // 下载导入模板
    function downloadImportTemplate() {
      // 准备模板数据，包含所有需要用户填写的字段
      const templateData = [{
        '姓名': '张三',
        '性别': '男',
        '出生日期': '1980-01-01',
        '出生时间': '12:00',
        '去世日期': '',
        '生平简介': '暂无简介',
        '父亲': '',
        '母亲': '',
        '配偶': ''
      }];
      
      // 创建工作表
      const worksheet = XLSX.utils.json_to_sheet(templateData);
      
      // 创建工作簿
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, '家族成员');
      
      // 导出为Excel文件
      XLSX.writeFile(workbook, 'family_tree_import_template.xlsx');
    }
  </script>
